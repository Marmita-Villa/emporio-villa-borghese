<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/logo.png" type="image/png">
  <title>Empório Villa Borghese — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --laranja:      #C47832;
      --laranja-dark: #3D1F08;
      --laranja-mid:  #D4924A;
      --laranja-pale: #F5E8CC;
      --creme:        #FDF7EE;
      --creme-dark:   #F5EDD8;
      --cinza-1:      #F5F2EC;
      --cinza-2:      #E8E0D0;
      --cinza-3:      #9E9080;
      --cinza-4:      #6B5F50;
      --texto:        #2A1F10;
      --branco:       #FFFFFF;
      --sombra:       0 1px 6px rgba(196,120,50,0.12);
      --sombra-lg:    0 4px 20px rgba(196,120,50,0.16);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--creme); color: var(--texto); }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
      background: linear-gradient(145deg, var(--laranja-dark) 0%, var(--laranja) 100%);
    }
    .login-box {
      background: var(--branco); border-radius: 20px; padding: 44px 52px;
      box-shadow: var(--sombra-lg); text-align: center; width: 360px;
    }
    .login-box img { width: 110px; margin-bottom: 16px; }
    .login-box h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--laranja-dark); margin-bottom: 4px; }
    .login-box p { color: var(--cinza-3); font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--cinza-2);
      border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none;
      background: var(--creme); font-family: inherit;
    }
    .login-box input:focus { border-color: var(--laranja-mid); }
    .login-box button {
      width: 100%; padding: 13px; background: var(--laranja); color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.2s;
    }
    .login-box button:hover { background: var(--laranja-mid); }
    .login-error { color: #c0392b; font-size: 13px; margin-top: 8px; }

    /* ── App ── */
    #app { display: none; }

    header {
      background: linear-gradient(90deg, var(--laranja-dark) 0%, var(--laranja) 100%);
      color: white; padding: 0 28px;
      display: flex; align-items: center; gap: 14px; height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    header img { height: 44px; width: auto; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 18px; flex: 1; }
    header span { font-size: 12px; color: rgba(255,255,255,0.65); }

    .toolbar {
      background: var(--branco); padding: 12px 28px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--cinza-2); flex-wrap: wrap;
    }
    .toolbar label { font-size: 13px; color: var(--cinza-3); font-weight: 500; }
    .btn-periodo {
      padding: 6px 14px; border: 1.5px solid var(--cinza-2); background: var(--branco);
      border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.15s;
      font-family: inherit; color: var(--cinza-4);
    }
    .btn-periodo.active { background: var(--laranja); color: white; border-color: var(--laranja); }
    .btn-periodo:hover:not(.active) { background: var(--cinza-1); }
    .custom-dates { display: flex; gap: 6px; align-items: center; }
    .custom-dates input {
      padding: 6px 10px; border: 1.5px solid var(--cinza-2); border-radius: 8px;
      font-size: 13px; font-family: inherit; background: var(--creme); outline: none;
    }
    .custom-dates input:focus { border-color: var(--laranja-mid); }
    .toolbar-right { margin-left: auto; display: flex; gap: 8px; }
    .btn-export {
      padding: 7px 16px; border: 1.5px solid var(--cinza-2); background: var(--branco);
      border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; color: var(--cinza-4); transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-export:hover { background: var(--cinza-1); border-color: var(--cinza-3); }
    .btn-export.pdf { border-color: #e74c3c; color: #e74c3c; }
    .btn-export.pdf:hover { background: #fdecea; }
    .btn-export.excel { border-color: #27ae60; color: #27ae60; }
    .btn-export.excel:hover { background: #eafaf1; }
    .btn-atualizar {
      padding: 7px 18px; background: var(--laranja); color: white; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.2s;
    }
    .btn-atualizar:hover { background: var(--laranja-mid); }

    main { padding: 24px 28px; max-width: 1500px; margin: 0 auto; }

    /* ── Seções ── */
    .section-title {
      font-family: 'Playfair Display', serif; font-size: 17px; color: var(--laranja-dark);
      margin: 28px 0 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--laranja-pale);
      display: flex; align-items: center; gap: 10px;
    }

    /* ── KPI Cards ── */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      gap: 14px; margin-bottom: 8px;
    }
    .kpi-card {
      background: var(--branco); border-radius: 12px; padding: 18px 20px;
      box-shadow: var(--sombra); border-left: 4px solid var(--laranja);
    }
    .kpi-card .icon { font-size: 20px; margin-bottom: 8px; }
    .kpi-card .value { font-size: 24px; font-weight: 700; color: var(--laranja); }
    .kpi-card .label { font-size: 11px; color: var(--cinza-3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-card.azul   { border-left-color: var(--laranja-mid); }   .kpi-card.azul .value   { color: var(--laranja-mid); }
    .kpi-card.verde  { border-left-color: #7A3E14; }              .kpi-card.verde .value  { color: #7A3E14; }
    .kpi-card.roxo   { border-left-color: var(--laranja-dark); }  .kpi-card.roxo .value   { color: var(--laranja-dark); }
    .kpi-card.vermelho{ border-left-color: #8B4513; }             .kpi-card.vermelho .value{ color: #8B4513; }
    .kpi-card.cinza  { border-left-color: var(--cinza-3); }       .kpi-card.cinza .value  { color: var(--cinza-4); }
    .kpi-card.dourado{ border-left-color: var(--laranja); }       .kpi-card.dourado .value{ color: var(--laranja); }

    /* ── Grids de cards ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 0; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 0; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; margin-bottom: 0; }
    @media (max-width: 1100px) { .grid-4 { grid-template-columns: 1fr 1fr; } .grid-3 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 700px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

    .card {
      background: var(--branco); border-radius: 12px; padding: 20px 22px;
      box-shadow: var(--sombra);
    }
    .card h3 { font-size: 13px; font-weight: 700; color: var(--texto); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chart-wrap { position: relative; height: 220px; }
    .chart-wrap-sm { position: relative; height: 170px; }

    /* ── Tabelas ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 9px 10px; color: var(--cinza-3); font-weight: 600;
      border-bottom: 1px solid var(--cinza-1); font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
    }
    td { padding: 9px 10px; border-bottom: 1px solid var(--cinza-1); }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--cinza-1); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .rank { color: var(--cinza-3); font-weight: 700; width: 28px; }
    .medal-1 { color: #f39c12; }
    .medal-2 { color: #636e72; }
    .medal-3 { color: #b7860a; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.pix { background: #d4edda; color: #155724; }
    .badge.cartao { background: #cce5ff; color: #004085; }
    .badge.dinheiro { background: #fff3cd; color: #856404; }

    /* ── Barra de progresso ── */
    .bar-wrap { background: var(--cinza-1); border-radius: 4px; height: 6px; margin-top: 4px; }
    .bar-fill { height: 6px; border-radius: 4px; background: var(--laranja); transition: width 0.5s; }

    .empty { text-align: center; color: var(--cinza-3); padding: 32px; font-size: 13px; }
    .loading { text-align: center; padding: 80px; color: var(--cinza-3); font-size: 15px; }

    /* ── Print ── */
    @media print {
      header, .toolbar, .section-title { break-inside: avoid; }
      .card { break-inside: avoid; box-shadow: none; border: 1px solid var(--cinza-2); }
      .btn-export, .btn-atualizar, .btn-periodo, .custom-dates { display: none; }
      main { padding: 10px; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <img src="/logo.png" alt="Empório Villa Borghese">
    <h2>Empório Villa Borghese</h2>
    <p>Dashboard Gerencial</p>
    <input type="password" id="senha-input" placeholder="Senha de acesso" />
    <button onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="login-erro"></div>
  </div>
</div>

<div id="app">
  <header>
    <img src="/logo.png" alt="Logo">
    <h1>Dashboard Gerencial</h1>
    <span id="ultima-atualizacao"></span>
  </header>

  <div class="toolbar">
    <label>Período:</label>
    <button class="btn-periodo" data-periodo="hoje">Hoje</button>
    <button class="btn-periodo active" data-periodo="7d">7 dias</button>
    <button class="btn-periodo" data-periodo="30d">30 dias</button>
    <div class="custom-dates">
      <input type="date" id="data-from" />
      <span style="color:var(--cinza-3);font-size:13px">até</span>
      <input type="date" id="data-to" />
    </div>
    <button class="btn-atualizar" onclick="carregarDados()">↺ Atualizar</button>
    <div class="toolbar-right">
      <button class="btn-export excel" onclick="exportarExcel()">📊 Excel</button>
      <button class="btn-export pdf" onclick="exportarPDF()">🖨️ PDF</button>
    </div>
  </div>

  <main id="main-content">
    <div class="loading">Carregando dados...</div>
  </main>
</div>

<script>
  let apiKey = '';
  let periodoAtual = '7d';
  let charts = {};
  let dadosAtuais = null;

  document.getElementById('senha-input').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });

  async function fazerLogin() {
    const senha = document.getElementById('senha-input').value.trim();
    if (!senha) return;
    const res = await fetch(`/api/dashboard?key=${encodeURIComponent(senha)}&periodo=hoje`);
    if (res.status === 401) { document.getElementById('login-erro').textContent = 'Senha incorreta.'; return; }
    apiKey = senha;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    carregarDados();
  }

  document.querySelectorAll('.btn-periodo').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.btn-periodo').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      periodoAtual = btn.dataset.periodo;
      document.getElementById('data-from').value = '';
      document.getElementById('data-to').value = '';
      carregarDados();
    });
  });

  async function carregarDados() {
    const from = document.getElementById('data-from').value;
    const to   = document.getElementById('data-to').value;
    let url = `/api/dashboard?key=${encodeURIComponent(apiKey)}`;
    if (from && to) url += `&from=${from}&to=${to}`;
    else url += `&periodo=${periodoAtual}`;

    document.getElementById('main-content').innerHTML = '<div class="loading">⏳ Carregando relatórios...</div>';
    try {
      const res = await fetch(url);
      dadosAtuais = await res.json();
      renderDashboard(dadosAtuais);
      document.getElementById('ultima-atualizacao').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
    } catch(e) {
      document.getElementById('main-content').innerHTML = '<div class="loading">Erro ao carregar dados.</div>';
    }
  }

  function renderDashboard(d) {
    const { kpis, topProdutos, topOfertas, topItens, topClientes, vendasPorDia, vendasPorDiaSemana, pagamentos, atendimentosPorHora, ultimosPedidos, relatorioAtendentes = [] } = d;
    Object.values(charts).forEach(c => c.destroy());
    charts = {};

    document.getElementById('main-content').innerHTML = `
      <!-- KPIs Vendas -->
      <div class="section-title">💰 Vendas & Pedidos</div>
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="icon">💰</div>
          <div class="value">R$ ${fmt(kpis.totalVendido)}</div>
          <div class="label">Total Vendido</div>
        </div>
        <div class="kpi-card azul">
          <div class="icon">📦</div>
          <div class="value">${kpis.totalPedidos}</div>
          <div class="label">Pedidos Finalizados</div>
        </div>
        <div class="kpi-card verde">
          <div class="icon">🧾</div>
          <div class="value">R$ ${fmt(kpis.ticketMedio)}</div>
          <div class="label">Ticket Médio</div>
        </div>
        <div class="kpi-card dourado">
          <div class="icon">🎯</div>
          <div class="value">${kpis.taxaConversao.toFixed(1)}%</div>
          <div class="label">Taxa de Conversão</div>
        </div>
        <div class="kpi-card roxo">
          <div class="icon">💬</div>
          <div class="value">${kpis.totalAtendimentos}</div>
          <div class="label">Total Atendimentos</div>
        </div>
        <div class="kpi-card cinza">
          <div class="icon">🤖</div>
          <div class="value">${kpis.apenasBot}</div>
          <div class="label">Resolvidos pelo Bot</div>
        </div>
        <div class="kpi-card vermelho">
          <div class="icon">👤</div>
          <div class="value">${kpis.transferidosHumano}</div>
          <div class="label">Trocaram p/ Humano</div>
        </div>
      </div>

      <!-- Gráficos linha do tempo -->
      <div class="section-title">📈 Evolução no Período</div>
      <div class="grid-2" style="margin-bottom:16px">
        <div class="card">
          <h3>📈 Faturamento por Dia</h3>
          <div class="chart-wrap"><canvas id="chart-vendas"></canvas></div>
        </div>
        <div class="card">
          <h3>📦 Pedidos por Dia</h3>
          <div class="chart-wrap"><canvas id="chart-pedidos-dia"></canvas></div>
        </div>
      </div>

      <!-- Distribuições -->
      <div class="section-title">🔍 Análise de Padrões</div>
      <div class="grid-3" style="margin-bottom:16px">
        <div class="card">
          <h3>💳 Formas de Pagamento</h3>
          <div class="chart-wrap"><canvas id="chart-pagamentos"></canvas></div>
        </div>
        <div class="card">
          <h3>⏰ Horário de Pico</h3>
          <div class="chart-wrap"><canvas id="chart-horas"></canvas></div>
        </div>
        <div class="card">
          <h3>📅 Dias da Semana</h3>
          <div class="chart-wrap"><canvas id="chart-diasemana"></canvas></div>
        </div>
      </div>

      <!-- Produtos -->
      <div class="section-title">🛒 Análise de Produtos</div>
      <div class="grid-3" style="margin-bottom:16px">
        <div class="card">
          <h3>🏆 Mais Vendidos (Geral)</h3>
          ${tabelaRanking(topItens, 10)}
        </div>
        <div class="card">
          <h3>🛍️ Top Produtos do Cardápio</h3>
          ${tabelaRanking(topProdutos, 10)}
        </div>
        <div class="card">
          <h3>🎁 Top Ofertas / Promoções</h3>
          ${tabelaRanking(topOfertas, 10)}
        </div>
      </div>

      <!-- Clientes -->
      <div class="section-title">👥 Análise de Clientes</div>
      <div class="grid-2" style="margin-bottom:16px">
        <div class="card">
          <h3>⭐ Clientes que Mais Pedem</h3>
          ${tabelaClientes(topClientes)}
        </div>
        <div class="card">
          <h3>📋 Últimos Pedidos</h3>
          ${tabelaPedidos(ultimosPedidos)}
        </div>
      </div>

      <!-- Produtividade -->
      <div class="section-title">📊 Produtividade da Equipe</div>
      <div class="grid-2" style="margin-bottom:16px">
        <div class="card">
          <h3>👤 Desempenho por Atendente</h3>
          ${tabelaAtendentes(relatorioAtendentes)}
        </div>
        <div class="card">
          <h3>🤖 Desempenho do Bot (mAI)</h3>
          ${cardBot(kpis)}
        </div>
      </div>
    `;

    // Chart faturamento
    if (vendasPorDia.length) {
      charts.vendas = new Chart(document.getElementById('chart-vendas'), {
        type: 'line',
        data: {
          labels: vendasPorDia.map(d => fmtData(d.data)),
          datasets: [{ label: 'R$', data: vendasPorDia.map(d => d.total),
            borderColor: '#C47832', backgroundColor: 'rgba(196,120,50,0.10)',
            fill: true, tension: 0.4, pointRadius: 3, borderWidth: 2 }],
        },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { ticks: { callback: v => 'R$' + fmt(v) } } } },
      });
      charts.pedidosDia = new Chart(document.getElementById('chart-pedidos-dia'), {
        type: 'bar',
        data: {
          labels: vendasPorDia.map(d => fmtData(d.data)),
          datasets: [{ label: 'Pedidos', data: vendasPorDia.map(d => d.pedidos),
            backgroundColor: 'rgba(196,120,50,0.75)', borderRadius: 4 }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
      });
    }

    // Chart pagamentos
    const pgKeys = Object.keys(pagamentos);
    if (pgKeys.length) {
      charts.pagamentos = new Chart(document.getElementById('chart-pagamentos'), {
        type: 'doughnut',
        data: {
          labels: pgKeys,
          datasets: [{ data: pgKeys.map(k => pagamentos[k]),
            backgroundColor: ['#C47832','#D4924A','#E8B070','#3D1F08','#F5E8CC','#9E9080'] }],
        },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } },
      });
    }

    // Chart horas
    charts.horas = new Chart(document.getElementById('chart-horas'), {
      type: 'bar',
      data: {
        labels: Array.from({length:24}, (_,i) => i + 'h'),
        datasets: [{ label: 'Atendimentos', data: atendimentosPorHora,
          backgroundColor: atendimentosPorHora.map(v => v === Math.max(...atendimentosPorHora) ? '#C47832' : 'rgba(196,120,50,0.4)'),
          borderRadius: 3 }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
    });

    // Chart dia da semana
    if (vendasPorDiaSemana) {
      charts.diasemana = new Chart(document.getElementById('chart-diasemana'), {
        type: 'bar',
        data: {
          labels: vendasPorDiaSemana.map(d => d.dia),
          datasets: [{ label: 'Pedidos', data: vendasPorDiaSemana.map(d => d.pedidos),
            backgroundColor: vendasPorDiaSemana.map(d => d.pedidos === Math.max(...vendasPorDiaSemana.map(x => x.pedidos)) ? '#C47832' : 'rgba(196,120,50,0.4)'),
            borderRadius: 4 }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
      });
    }
  }

  function tabelaRanking(items, max) {
    if (!items?.length) return '<div class="empty">Nenhum dado no período</div>';
    const maxQtd = items[0].quantidade;
    return `<table>
      <thead><tr><th class="rank">#</th><th>Item</th><th class="num">Qtd</th><th class="num">Valor</th></tr></thead>
      <tbody>${items.slice(0, max).map((p, i) => `<tr>
        <td class="rank ${i===0?'medal-1':i===1?'medal-2':i===2?'medal-3':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
        <td>
          <div style="font-size:13px">${esc(p.nome)}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(p.quantidade/maxQtd*100)}%"></div></div>
        </td>
        <td class="num"><strong>${p.quantidade}</strong></td>
        <td class="num" style="color:var(--cinza-3)">R$ ${fmt(p.valor)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  function tabelaClientes(clientes) {
    if (!clientes?.length) return '<div class="empty">Nenhum pedido no período</div>';
    const maxPed = clientes[0].pedidos;
    return `<table>
      <thead><tr><th class="rank">#</th><th>Cliente</th><th class="num">Pedidos</th><th class="num">Total Gasto</th></tr></thead>
      <tbody>${clientes.slice(0, 12).map((c, i) => `<tr>
        <td class="rank ${i===0?'medal-1':i===1?'medal-2':i===2?'medal-3':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
        <td>
          <div>${esc(c.nome)}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(c.pedidos/maxPed*100)}%"></div></div>
        </td>
        <td class="num"><strong>${c.pedidos}</strong></td>
        <td class="num" style="color:var(--cinza-3)">R$ ${fmt(c.valor)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  function tabelaAtendentes(atendentes) {
    if (!atendentes?.length) return '<div class="empty">Nenhum atendimento humano no período</div>';
    const maxConv = atendentes[0].conversas;
    return `<table>
      <thead><tr>
        <th>Atendente</th>
        <th class="num">Conversas</th>
        <th class="num">Mensagens</th>
        <th class="num">TMA</th>
      </tr></thead>
      <tbody>${atendentes.map((a, i) => `<tr>
        <td>
          <div style="font-weight:600">${i===0?'🏆 ':''}${esc(a.nome)}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(a.conversas/maxConv*100)}%"></div></div>
        </td>
        <td class="num"><strong>${a.conversas}</strong></td>
        <td class="num">${a.mensagens || 0}</td>
        <td class="num" style="color:var(--cinza-3)">${a.tempoMedio != null ? a.tempoMedio + ' min' : '—'}</td>
      </tr>`).join('')}</tbody>
    </table>
    <div style="font-size:11px;color:var(--cinza-3);margin-top:12px">TMA = Tempo Médio de Atendimento</div>`;
  }

  function cardBot(kpis) {
    const total = kpis.totalAtendimentos || 0;
    const bot = kpis.apenasBot || 0;
    const conv = kpis.convertidos || 0;
    const transf = kpis.transferidosHumano || 0;
    const txBot = total > 0 ? (bot / total * 100).toFixed(1) : 0;
    const txConv = total > 0 ? (conv / total * 100).toFixed(1) : 0;
    const txTransf = total > 0 ? (transf / total * 100).toFixed(1) : 0;
    return `
      <div style="display:flex;flex-direction:column;gap:16px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div style="background:var(--cinza-1);border-radius:10px;padding:14px;text-align:center">
            <div style="font-size:22px;font-weight:700;color:var(--laranja)">${total}</div>
            <div style="font-size:11px;color:var(--cinza-3);margin-top:2px;text-transform:uppercase">Total conversas</div>
          </div>
          <div style="background:var(--laranja-pale);border-radius:10px;padding:14px;text-align:center">
            <div style="font-size:22px;font-weight:700;color:var(--laranja-dark)">${conv}</div>
            <div style="font-size:11px;color:var(--cinza-3);margin-top:2px;text-transform:uppercase">Pedidos gerados</div>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
            <span>🤖 Resolvidas pelo bot</span><strong>${bot} (${txBot}%)</strong>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${txBot}%;background:var(--laranja-dark)"></div></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
            <span>✅ Taxa de conversão</span><strong>${txConv}%</strong>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${txConv}%;background:var(--laranja)"></div></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
            <span>👤 Transferidas p/ humano</span><strong>${transf} (${txTransf}%)</strong>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${txTransf}%;background:var(--laranja-mid)"></div></div>
        </div>
      </div>`;
  }

  function tabelaPedidos(pedidos) {
    if (!pedidos?.length) return '<div class="empty">Nenhum pedido no período</div>';
    return `<table>
      <thead><tr><th>Pedido</th><th>Cliente</th><th class="num">Total</th><th>Pagto</th><th>Data</th></tr></thead>
      <tbody>${pedidos.map(p => `<tr>
        <td><strong>#${p.numero || '—'}</strong></td>
        <td style="max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.cliente || '—')}</td>
        <td class="num">R$ ${fmt(p.total)}</td>
        <td><span class="badge ${badgeClass(p.forma_pagamento)}">${p.forma_pagamento || '—'}</span></td>
        <td style="color:var(--cinza-3);font-size:11px">${fmtDt(p.created_at)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  // ── Exportar Excel ──
  function exportarExcel() {
    if (!dadosAtuais) return;
    const { kpis, topItens, topProdutos, topOfertas, topClientes, relatorioAtendentes, ultimosPedidos, vendasPorDia, vendasPorDiaSemana } = dadosAtuais;
    const wb = XLSX.utils.book_new();

    // KPIs
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['Métrica', 'Valor'],
      ['Total Vendido', kpis.totalVendido],
      ['Pedidos Finalizados', kpis.totalPedidos],
      ['Ticket Médio', kpis.ticketMedio],
      ['Total Atendimentos', kpis.totalAtendimentos],
      ['Taxa de Conversão (%)', +kpis.taxaConversao.toFixed(2)],
      ['Resolvidos pelo Bot', kpis.apenasBot],
      ['Transferidos p/ Humano', kpis.transferidosHumano],
    ]), 'KPIs');

    // Top Itens
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['#', 'Item', 'Quantidade', 'Valor Total'],
      ...topItens.map((p, i) => [i+1, p.nome, p.quantidade, p.valor]),
    ]), 'Itens Mais Vendidos');

    // Top Produtos
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['#', 'Produto', 'Quantidade', 'Valor Total'],
      ...topProdutos.map((p, i) => [i+1, p.nome, p.quantidade, p.valor]),
    ]), 'Top Produtos');

    // Top Ofertas
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['#', 'Oferta', 'Quantidade', 'Valor Total'],
      ...topOfertas.map((p, i) => [i+1, p.nome, p.quantidade, p.valor]),
    ]), 'Top Ofertas');

    // Top Clientes
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['#', 'Cliente', 'Pedidos', 'Total Gasto'],
      ...topClientes.map((c, i) => [i+1, c.nome, c.pedidos, c.valor]),
    ]), 'Top Clientes');

    // Atendentes
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['Atendente', 'Conversas', 'Mensagens Enviadas', 'TMA (min)'],
      ...relatorioAtendentes.map(a => [a.nome, a.conversas, a.mensagens || 0, a.tempoMedio ?? '']),
    ]), 'Atendentes');

    // Vendas por dia
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['Data', 'Pedidos', 'Total (R$)'],
      ...vendasPorDia.map(d => [d.data, d.pedidos, d.total]),
    ]), 'Vendas por Dia');

    // Vendas por dia da semana
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['Dia', 'Pedidos', 'Total (R$)'],
      ...(vendasPorDiaSemana || []).map(d => [d.dia, d.pedidos, d.total]),
    ]), 'Dias da Semana');

    // Últimos pedidos
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['#Pedido', 'Cliente', 'Total', 'Pagamento', 'Data'],
      ...ultimosPedidos.map(p => [p.numero, p.cliente, p.total, p.forma_pagamento, p.created_at]),
    ]), 'Ultimos Pedidos');

    XLSX.writeFile(wb, `relatorio-villa-borghese-${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  // ── Exportar PDF ──
  function exportarPDF() { window.print(); }

  // ── Helpers ──
  function fmt(v) { return Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtData(d) { const [y,m,di] = d.split('-'); return `${di}/${m}`; }
  function fmtDt(d) { return new Date(d).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }); }
  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function badgeClass(fp) {
    if (!fp) return '';
    const f = fp.toLowerCase();
    if (f.includes('pix')) return 'pix';
    if (f.includes('cart')) return 'cartao';
    if (f.includes('dinheiro')) return 'dinheiro';
    return '';
  }
</script>
</body>
</html>
