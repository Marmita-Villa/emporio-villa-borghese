<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villa Borghese — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; color: #2d3436; }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #075E54;
    }
    .login-box {
      background: white; border-radius: 12px; padding: 40px 48px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2); text-align: center; width: 340px;
    }
    .login-box img { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; margin-bottom: 16px; }
    .login-box h2 { font-size: 20px; margin-bottom: 4px; }
    .login-box p { color: #636e72; font-size: 13px; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 11px 14px; border: 1px solid #dfe6e9;
      border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #075E54; }
    .login-box button {
      width: 100%; padding: 12px; background: #075E54; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .login-box button:hover { background: #128C7E; }
    .login-error { color: #e17055; font-size: 13px; margin-top: 8px; }

    /* ── App ── */
    #app { display: none; }

    header {
      background: #075E54; color: white; padding: 14px 28px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    header h1 { font-size: 18px; font-weight: 700; flex: 1; }
    header span { font-size: 12px; color: #B2DFDB; }

    .toolbar {
      background: white; padding: 14px 28px; display: flex; align-items: center;
      gap: 10px; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap;
    }
    .toolbar label { font-size: 13px; color: #636e72; font-weight: 500; }
    .btn-periodo {
      padding: 7px 16px; border: 1px solid #dfe6e9; background: white;
      border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.15s;
    }
    .btn-periodo.active { background: #075E54; color: white; border-color: #075E54; }
    .btn-periodo:hover:not(.active) { background: #f0f0f0; }
    .custom-dates { display: flex; gap: 8px; align-items: center; }
    .custom-dates input { padding: 6px 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 13px; }
    .btn-atualizar {
      padding: 8px 18px; background: #25D366; color: white; border: none;
      border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: auto;
    }
    .btn-atualizar:hover { background: #128C7E; }

    main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

    /* ── KPI Cards ── */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .kpi-card {
      background: white; border-radius: 12px; padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #075E54;
    }
    .kpi-card .icon { font-size: 22px; margin-bottom: 8px; }
    .kpi-card .value { font-size: 26px; font-weight: 700; color: #075E54; }
    .kpi-card .label { font-size: 12px; color: #636e72; margin-top: 4px; }
    .kpi-card.orange { border-left-color: #e17055; }
    .kpi-card.orange .value { color: #e17055; }
    .kpi-card.blue { border-left-color: #0984e3; }
    .kpi-card.blue .value { color: #0984e3; }
    .kpi-card.purple { border-left-color: #6c5ce7; }
    .kpi-card.purple .value { color: #6c5ce7; }
    .kpi-card.teal { border-left-color: #00b894; }
    .kpi-card.teal .value { color: #00b894; }
    .kpi-card.gray { border-left-color: #b2bec3; }
    .kpi-card.gray .value { color: #636e72; }

    /* ── Charts ── */
    .chart-grid {
      display: grid; grid-template-columns: 2fr 1fr;
      gap: 16px; margin-bottom: 24px;
    }
    .chart-grid-3 {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 16px; margin-bottom: 24px;
    }
    @media (max-width: 900px) {
      .chart-grid, .chart-grid-3 { grid-template-columns: 1fr; }
    }
    .card {
      background: white; border-radius: 12px; padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h3 { font-size: 14px; font-weight: 600; color: #2d3436; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .chart-wrap { position: relative; height: 240px; }

    /* ── Tables ── */
    .table-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-bottom: 24px;
    }
    @media (max-width: 900px) { .table-grid { grid-template-columns: 1fr; } }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; color: #636e72; font-weight: 600; border-bottom: 1px solid #f0f0f0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 9px 10px; border-bottom: 1px solid #f8f9fa; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fa; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.pix { background: #d4edda; color: #155724; }
    .badge.cartao { background: #cce5ff; color: #004085; }
    .badge.dinheiro { background: #fff3cd; color: #856404; }
    .empty-state { text-align: center; color: #b2bec3; padding: 32px; font-size: 13px; }
    .loading { text-align: center; padding: 60px; color: #636e72; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <img src="/logo.png" alt="Villa Borghese" onerror="this.style.display='none'">
    <h2>Villa Borghese</h2>
    <p>Dashboard de Atendimento</p>
    <input type="password" id="senha-input" placeholder="Senha de acesso" />
    <button onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="login-erro"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <img src="/logo.png" alt="Villa Borghese" onerror="this.style.display='none'">
    <h1>Dashboard de Atendimento</h1>
    <span id="ultima-atualizacao"></span>
  </header>

  <div class="toolbar">
    <label>Período:</label>
    <button class="btn-periodo" data-periodo="hoje">Hoje</button>
    <button class="btn-periodo active" data-periodo="7d">7 dias</button>
    <button class="btn-periodo" data-periodo="30d">30 dias</button>
    <div class="custom-dates">
      <input type="date" id="data-from" />
      <span style="color:#636e72">até</span>
      <input type="date" id="data-to" />
    </div>
    <button class="btn-atualizar" onclick="carregarDados()">↺ Atualizar</button>
  </div>

  <main id="main-content">
    <div class="loading">Carregando dados...</div>
  </main>
</div>

<script>
  let apiKey = '';
  let periodoAtual = '7d';
  let charts = {};

  // ── Login ──
  document.getElementById('senha-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin();
  });

  async function fazerLogin() {
    const senha = document.getElementById('senha-input').value.trim();
    if (!senha) return;
    const res = await fetch(`/api/dashboard?key=${encodeURIComponent(senha)}&periodo=hoje`);
    if (res.status === 401) {
      document.getElementById('login-erro').textContent = 'Senha incorreta.';
      return;
    }
    apiKey = senha;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    carregarDados();
  }

  // ── Período ──
  document.querySelectorAll('.btn-periodo').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.btn-periodo').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      periodoAtual = btn.dataset.periodo;
      document.getElementById('data-from').value = '';
      document.getElementById('data-to').value = '';
      carregarDados();
    });
  });

  // ── Carregar dados ──
  async function carregarDados() {
    const from = document.getElementById('data-from').value;
    const to   = document.getElementById('data-to').value;
    let url = `/api/dashboard?key=${encodeURIComponent(apiKey)}`;
    if (from && to) url += `&from=${from}&to=${to}`;
    else url += `&periodo=${periodoAtual}`;

    document.getElementById('main-content').innerHTML = '<div class="loading">Carregando...</div>';

    try {
      const res = await fetch(url);
      const data = await res.json();
      renderDashboard(data);
      document.getElementById('ultima-atualizacao').textContent =
        'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
    } catch (e) {
      document.getElementById('main-content').innerHTML = '<div class="loading">Erro ao carregar dados.</div>';
    }
  }

  // ── Render ──
  function renderDashboard(data) {
    const { kpis, topProdutos, topOfertas, vendasPorDia, pagamentos, atendimentosPorHora, ultimosPedidos, relatorioAtendentes = [] } = data;
    Object.values(charts).forEach(c => c.destroy());
    charts = {};

    const html = `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="icon">💰</div>
          <div class="value">R$ ${fmt(kpis.totalVendido)}</div>
          <div class="label">Total Vendido</div>
        </div>
        <div class="kpi-card blue">
          <div class="icon">📦</div>
          <div class="value">${kpis.totalPedidos}</div>
          <div class="label">Pedidos Finalizados</div>
        </div>
        <div class="kpi-card teal">
          <div class="icon">🧾</div>
          <div class="value">R$ ${fmt(kpis.ticketMedio)}</div>
          <div class="label">Ticket Médio</div>
        </div>
        <div class="kpi-card purple">
          <div class="icon">💬</div>
          <div class="value">${kpis.totalAtendimentos}</div>
          <div class="label">Atendimentos</div>
        </div>
        <div class="kpi-card orange">
          <div class="icon">🎯</div>
          <div class="value">${kpis.taxaConversao.toFixed(1)}%</div>
          <div class="label">Taxa de Conversão</div>
        </div>
        <div class="kpi-card gray">
          <div class="icon">👤</div>
          <div class="value">${kpis.transferidosHumano}</div>
          <div class="label">Trocaram p/ Humano</div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="card">
          <h3>📈 Vendas por Dia</h3>
          <div class="chart-wrap"><canvas id="chart-vendas"></canvas></div>
        </div>
        <div class="card">
          <h3>💳 Formas de Pagamento</h3>
          <div class="chart-wrap"><canvas id="chart-pagamentos"></canvas></div>
        </div>
      </div>

      <div class="chart-grid">
        <div class="card">
          <h3>⏰ Pico de Atendimentos por Hora</h3>
          <div class="chart-wrap"><canvas id="chart-horas"></canvas></div>
        </div>
        <div class="card">
          <h3>📊 Pedidos por Dia</h3>
          <div class="chart-wrap"><canvas id="chart-pedidos-dia"></canvas></div>
        </div>
      </div>

      <div class="table-grid">
        <div class="card">
          <h3>🏆 Top Produtos Vendidos</h3>
          ${tabelaProdutos(topProdutos)}
        </div>
        <div class="card">
          <h3>🎁 Top Ofertas Vendidas</h3>
          ${tabelaProdutos(topOfertas)}
        </div>
      </div>

      <div class="table-grid">
        <div class="card">
          <h3>👤 Desempenho por Atendente</h3>
          ${relatorioAtendentes.length ? `
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="border-bottom:2px solid #f0f0f0">
              <th style="padding:8px 12px;text-align:left;color:#636e72;font-size:11px;text-transform:uppercase">Atendente</th>
              <th style="padding:8px 12px;text-align:center;color:#636e72;font-size:11px;text-transform:uppercase">Conversas</th>
              <th style="padding:8px 12px;text-align:center;color:#636e72;font-size:11px;text-transform:uppercase">Tempo Médio</th>
            </tr></thead>
            <tbody>${relatorioAtendentes.map(a => `
              <tr style="border-bottom:1px solid #f8f9fa">
                <td style="padding:10px 12px;font-weight:600">👤 ${a.nome}</td>
                <td style="padding:10px 12px;text-align:center">${a.conversas}</td>
                <td style="padding:10px 12px;text-align:center;color:#636e72">${a.tempoMedio != null ? a.tempoMedio + ' min' : '—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>` : '<div style="padding:24px;text-align:center;color:#b2bec3">Sem dados no período</div>'}
        </div>
        <div class="card">
          <h3>📋 Últimos Pedidos</h3>
          ${tabelaPedidos(ultimosPedidos)}
        </div>
      </div>
    `;

    document.getElementById('main-content').innerHTML = html;

    // Chart vendas por dia
    if (vendasPorDia.length) {
      charts.vendas = new Chart(document.getElementById('chart-vendas'), {
        type: 'line',
        data: {
          labels: vendasPorDia.map(d => fmtData(d.data)),
          datasets: [{
            label: 'Vendas (R$)',
            data: vendasPorDia.map(d => d.total),
            borderColor: '#075E54', backgroundColor: 'rgba(7,94,84,0.08)',
            fill: true, tension: 0.4, pointRadius: 4,
          }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { y: { ticks: { callback: v => 'R$' + fmt(v) } } } },
      });

      charts.pedidosDia = new Chart(document.getElementById('chart-pedidos-dia'), {
        type: 'bar',
        data: {
          labels: vendasPorDia.map(d => fmtData(d.data)),
          datasets: [{
            label: 'Pedidos',
            data: vendasPorDia.map(d => d.pedidos),
            backgroundColor: 'rgba(9,132,227,0.7)', borderRadius: 4,
          }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
      });
    }

    // Chart pagamentos
    const pgKeys = Object.keys(pagamentos);
    if (pgKeys.length) {
      charts.pagamentos = new Chart(document.getElementById('chart-pagamentos'), {
        type: 'doughnut',
        data: {
          labels: pgKeys,
          datasets: [{ data: pgKeys.map(k => pagamentos[k]),
            backgroundColor: ['#075E54','#25D366','#0984e3','#e17055','#6c5ce7','#fdcb6e'] }],
        },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: { size: 12 } } } } },
      });
    }

    // Chart horas
    charts.horas = new Chart(document.getElementById('chart-horas'), {
      type: 'bar',
      data: {
        labels: Array.from({length:24}, (_,i) => i + 'h'),
        datasets: [{
          label: 'Atendimentos',
          data: atendimentosPorHora,
          backgroundColor: 'rgba(108,92,231,0.7)', borderRadius: 3,
        }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
    });
  }

  function tabelaProdutos(items) {
    if (!items.length) return '<div class="empty-state">Nenhum dado no período</div>';
    return `<table>
      <tr><th>#</th><th>Produto</th><th>Qtd</th><th>Valor</th></tr>
      ${items.map((p, i) => `<tr>
        <td style="color:#b2bec3">${i+1}</td>
        <td>${p.nome}</td>
        <td><strong>${p.quantidade}</strong></td>
        <td>R$ ${fmt(p.valor)}</td>
      </tr>`).join('')}
    </table>`;
  }

  function tabelaPedidos(pedidos) {
    if (!pedidos.length) return '<div class="empty-state">Nenhum pedido no período</div>';
    return `<table>
      <tr><th>Pedido</th><th>Cliente</th><th>Total</th><th>Pagamento</th><th>Data</th></tr>
      ${pedidos.map(p => `<tr>
        <td><strong>#${p.numero || '—'}</strong></td>
        <td>${p.cliente || '—'}</td>
        <td>R$ ${fmt(p.total)}</td>
        <td><span class="badge ${badgeClass(p.forma_pagamento)}">${p.forma_pagamento || '—'}</span></td>
        <td style="color:#636e72;font-size:12px">${fmtDateTime(p.created_at)}</td>
      </tr>`).join('')}
    </table>`;
  }

  function fmt(v) { return Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtData(d) { const [y,m,di] = d.split('-'); return `${di}/${m}`; }
  function fmtDateTime(d) { return new Date(d).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }); }
  function badgeClass(fp) {
    if (!fp) return '';
    const f = fp.toLowerCase();
    if (f.includes('pix')) return 'pix';
    if (f.includes('cart')) return 'cartao';
    if (f.includes('dinheiro')) return 'dinheiro';
    return '';
  }
</script>
</body>
</html>
